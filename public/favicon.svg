<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cue favicon — the mark: amber C on the dark stage, footlight below -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0e0d0b"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="#6b5320" stroke-width="2.5"/>
  <!-- spotlight glow -->
  <ellipse cx="32" cy="8" rx="26" ry="14" fill="#f5b942" opacity="0.14"/>
  <text x="32" y="43"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="36" font-weight="bold"
        text-anchor="middle" fill="#f5b942">C</text>
  <!-- the stage line -->
  <rect x="19" y="50" width="26" height="3" rx="1.5" fill="#6b5320"/>
</svg>
